# Same producer profile as batch-lz4 but the consumer persists every record to
# ClickHouse so latency / throughput can be analysed offline with SQL.
brokers: localhost:9092,localhost:9094,localhost:9095
topic: notifications

producer:
  mode: async
  acks: all
  linger: 10ms
  batch_max_bytes: 1048576
  compression: lz4
  max_buffered: 100000
  idempotent: true

consumer:
  group_id: kafkaforge-clickhouse
  fetch_min_bytes: 65536
  fetch_max_bytes: 10485760
  fetch_max_wait: 50ms
  sink: clickhouse
  clickhouse_dsn: clickhouse://default:@localhost:9000/default
  sink_batch_size: 5000
  sink_flush_period: 1s
