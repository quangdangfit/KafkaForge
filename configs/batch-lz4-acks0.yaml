# Fire-and-forget: producer never waits for the broker. Useful only as the
# theoretical-ceiling number — any failure is silently lost.
brokers: localhost:9092,localhost:9094,localhost:9095
topic: notifications

producer:
  mode: async
  acks: none
  linger: 10ms
  batch_max_bytes: 1048576
  compression: lz4
  max_buffered: 500000
  idempotent: false

consumer:
  group_id: kafkaforge-batch-lz4-acks0
  fetch_min_bytes: 65536
  fetch_max_bytes: 10485760
  fetch_max_wait: 50ms
  sink: discard
