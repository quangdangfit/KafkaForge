# Same batching as batch-lz4 but acks=1 (leader only) and idempotency disabled.
# Trades durability (no follower-side fsync wait) for ~50-100% extra throughput
# on local clusters where the followers fsync to the same disk.
brokers: localhost:9092,localhost:9094,localhost:9095
topic: notifications

producer:
  mode: async
  acks: leader
  linger: 20ms
  batch_max_bytes: 4194304    # 4 MiB
  compression: lz4
  max_buffered: 1000000
  idempotent: false

consumer:
  group_id: kafkaforge-batch-lz4-acks1
  fetch_min_bytes: 65536
  fetch_max_bytes: 10485760
  fetch_max_wait: 50ms
  sink: discard
